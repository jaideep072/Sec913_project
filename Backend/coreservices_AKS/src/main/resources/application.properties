spring.application.name=coreservices

# Server
server.port=${PORT:8001}

# PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver
# We use DatabaseConfig.java to parse DATABASE_URL injected by Render
# spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:Project_AKS}?sslmode=prefer
# spring.datasource.username=${DB_USER:postgres}
# spring.datasource.password=${DB_PASSWORD:cybersec123}

# JPA / Hibernate
# (dialect is auto-detected from the JDBC URL — no need to set it explicitly)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Pretty SQL in logs (helpful during dev, turn off in prod)
spring.jpa.properties.hibernate.format_sql=true
