spring.application.name=coreservices

# Server
server.port=8001

# PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/Project_AKS
spring.datasource.username=postgres
spring.datasource.password=admin123

# JPA / Hibernate
# (dialect is auto-detected from the JDBC URL — no need to set it explicitly)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Pretty SQL in logs (helpful during dev, turn off in prod)
spring.jpa.properties.hibernate.format_sql=true
